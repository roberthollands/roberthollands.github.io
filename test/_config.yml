title: "Robert Hollands"
description: "Cybersecurity Portfolio | CTF Writeups | Homelab Projects"
url: "https://roberthollands.github.io"
baseurl: ""
repository: "roberthollands/roberthollands.github.io"
author:
  name: "Robert Hollands"
  email: "abramhollandsbusiness@gmail.com"

theme: minimal-mistakes-jekyll

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: true

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
